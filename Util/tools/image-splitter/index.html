<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能拆图 · Util Toolbox</title>
    <!-- 共享样式 -->
    <link rel="stylesheet" href="../../style.css" />
    <!-- 子页面专属样式 -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <!-- 顶部导航占位（由 topnav.js 渲染） -->
        <div id="topnav-mount"></div>

        <!-- 上传区 -->
        <section class="card upload-card">
            <h2 class="card-title">🖼️ 上传需要拆分的合图</h2>
            <div class="divider"></div>
            <label class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden />
                <span class="upload-text" id="uploadText">更换图片 (点击或拖拽)</span>
            </label>
        </section>

        <!-- 预览 + 拆分结果 -->
        <section class="grid-2" id="resultLayout">
            <div class="card">
                <h2 class="card-title">🌄 原图预览</h2>
                <div class="divider"></div>
                <div class="preview-box" id="previewBox">
                    <span class="placeholder">尚未上传图片</span>
                </div>
                <p class="file-info" id="fileInfo"></p>
            </div>

            <div class="card">
                <h2 class="card-title">✅ 拆分结果</h2>
                <div class="divider"></div>
                <div class="result-header" id="resultHeader" hidden>
                    共拆分出 <strong id="resultCount">0</strong> 个组件
                    <span class="result-tools">
                        <button class="link-btn" id="selectAllBtn">全选</button>
                        <button class="link-btn" id="invertSelectBtn">反选</button>
                        <button class="link-btn" id="renameAllBtn">批量重命名</button>
                    </span>
                </div>
                <div class="result-grid" id="resultGrid">
                    <span class="placeholder">上传图片并点击"开始拆分"…</span>
                </div>
                <button class="btn-primary download-btn" id="downloadBtn" disabled>
                    📦 下载全部 (ZIP)
                </button>
            </div>
        </section>

        <!-- 拆分设置 -->
        <section class="card setting-card">
            <h2 class="card-title">⚙️ 拆分设置</h2>
            <div class="divider"></div>

            <label class="setting-label">最小尺寸过滤比例 (0.001 - 0.100)
                <span class="badge" id="ratioBadge">0.005</span>
            </label>
            <input type="range" id="ratioSlider" min="0.001" max="0.100" step="0.001" value="0.005" />

            <div class="tip-block">
                <strong>💡 调节建议：</strong>
                <ul>
                    <li><b>数值越小（如 0.001）</b>：越细致，能保留微小的装饰部件（如花纹、极小按钮）。</li>
                    <li><b>数值越大（如 0.050）</b>：越严格，会自动忽略掉碎片的噪点，只保留主体大图。</li>
                </ul>
            </div>

            <label class="setting-label">连通容差（Alpha 阈值，0 - 50）
                <span class="badge" id="alphaBadge">10</span>
            </label>
            <input type="range" id="alphaSlider" min="0" max="50" step="1" value="10" />

            <p class="setting-label">后处理选项</p>
            <label class="checkbox">
                <input type="checkbox" id="trimChk" checked />
                <span>自动切除多余透明区域</span>
            </label>
            <label class="checkbox">
                <input type="checkbox" id="diagChk" checked />
                <span>使用八邻域（更能粘合斜向接触的部件）</span>
            </label>

            <button class="btn-primary big-btn" id="splitBtn" disabled>
                🚀 开始拆分 <span class="free-tag">(免费)</span>
            </button>
        </section>

        <footer class="footer">
            <p>Smart Image Splitter · 纯前端实现，所有处理均在你的浏览器本地完成，图片不会上传到任何服务器。</p>
        </footer>
    </div>

    <!-- 重命名弹窗 -->
    <div class="modal" id="renameModal" hidden>
        <div class="modal-content">
            <h3 id="renameTitle">重命名</h3>
            <p class="modal-tip" id="renameTip"></p>
            <input type="text" id="renameInput" placeholder="请输入文件名（无需扩展名）" />
            <div class="modal-actions">
                <button class="btn-ghost" id="renameCancel">取消</button>
                <button class="btn-primary" id="renameConfirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 全屏预览弹窗 -->
    <div class="modal" id="previewModal" hidden>
        <div class="modal-content preview-modal">
            <img id="previewImg" alt="预览" />
            <button class="btn-ghost close-btn" id="previewClose">关闭</button>
        </div>
    </div>

    <!-- ===== 共享脚本 ===== -->
    <script src="../../tools.config.js"></script>
    <script src="../../shared.js"></script>
    <script src="../../components/topnav.js"></script>

    <!-- ===== 三方依赖 ===== -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <!-- ===== 业务脚本 ===== -->
    <script src="splitter.js"></script>
    <script src="app.js"></script>
</body>
</html>
